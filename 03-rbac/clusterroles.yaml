# clusterroles.yaml
# ClusterRoles apply across all namespaces
# Use sparingly — only when cross-namespace access is genuinely required

# SRE monitoring ClusterRole — read-only access to all namespaces
# Used by Prometheus and SRE tooling that needs cluster-wide visibility
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-cluster-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "nodes", "namespaces", "persistentvolumes", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
# ClusterRoleBinding attaches the ClusterRole to the sre-monitor service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-monitor-cluster-reader
subjects:
  - kind: ServiceAccount
    name: sre-monitor
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: sre-cluster-reader
  apiGroup: rbac.authorization.k8s.io
