# service-accounts.yaml
# Each namespace gets its own service account
# Service accounts are the identity that pods use to authenticate with the K8s API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-app
  namespace: dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: staging-app
  namespace: staging
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prod-app
  namespace: production
---
# SRE monitoring service account lives in the monitoring namespace
# but needs cross-namespace read access via ClusterRole
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-monitor
  namespace: monitoring
