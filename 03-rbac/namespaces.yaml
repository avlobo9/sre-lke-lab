# namespaces.yaml
# Creates three namespaces representing a typical dev/staging/production environment
apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    environment: dev
    team: engineering
---
apiVersion: v1
kind: Namespace
metadata:
  name: staging
  labels:
    environment: staging
    team: engineering
---
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    environment: production
    team: engineering
